<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amina Touati | Links</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="particles-container">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div id="toast-notification" class="toast hidden">
        Link copied to clipboard! 📋
    </div>

    <button id="dark-mode-btn" class="control-btn-top mode-toggle-left" aria-label="Toggle Dark Mode">
        <i class="fas fa-moon"></i>
    </button>
    <button id="share-btn" class="control-btn-top share-button-right" aria-label="Share Profile">
        <i class="fas fa-share-alt"></i>
    </button>

    <div id="welcome-page" class="page-stage">
        <div class="welcome-container">
            <h1 class="welcome-text">Hello, I'm Amina</h1>
            <button id="discover-btn" class="discover-btn">Discover My World</button>
        </div>
    </div>

    <div id="links-page" class="page-stage hidden">
        <div class="container">
            
            <div class="profile-header">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Amina" alt="Amina Touati" class="avatar">
                <h2 class="name">Amina Touati</h2>
                <div class="bio">
                    <span id="typewriter-text"></span><span class="cursor">|</span>
                </div>
            </div>

            <div class="links-wrapper">
                <a href="www.linkedin.com/in/amina-touati-8266b7326" target="_blank" class="link-card linkedin-btn">
                    <i class="fab fa-linkedin-in"></i>
                    <span class="link-title">LinkedIn</span>
                </a>

                <a href="https://github.com/xalvirea" target="_blank" class="link-card github-btn">
                    <i class="fab fa-github"></i>
                    <span class="link-title">GitHub</span>
                </a>

                <a href="https://www.instagram.com/xalvirea?igsh=dTdsMnJ1bXQwaGVl" target="_blank" class="link-card aura-btn">
                    <i class="fas fa-id-card"></i>
                    <span class="link-title">Aura Card</span>
                </a>

                <a href="#" target="_blank" class="link-card resume-btn">
                    <i class="fas fa-file-pdf"></i>
                    <span class="link-title">My CV</span>
                </a>

                <a href="https://instagram.com" target="_blank" class="link-card instagram-btn">
                    <i class="fab fa-instagram"></i>
                    <span class="link-title">Instagram</span>
                </a>

                <a href="https://www.facebook.com/share/1BBCRayd74/" target="_blank" class="link-card facebook-btn">
                    <i class="fab fa-facebook-f"></i>
                    <span class="link-title">Facebook</span>
                </a>
            </div>

            <footer class="footer">
                Made with <i class="fas fa-heart"></i> by Amina
            </footer>

        </div>
    </div>

    <div id="nav-arrow" class="nav-arrow-btn">
        <i class="fas fa-chevron-right"></i>
    </div>

    <script src="script.js"></script>
</body>
</html>
